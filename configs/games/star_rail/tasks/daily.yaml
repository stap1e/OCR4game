# 星穹铁道 — 日常任务工作流（含 when/if 分支）
# 模板：assets/ui/；回归帧：tests/fixtures/star_rail/frames/

name: star_rail_daily
description: |
  日常自动化：主界面 → 关弹窗 → 开拓指南 → 日常面板 → 领取 → 扫荡 → 回主界面。
  步骤级 when 按当前画面分支；do 内 if 处理可选 UI。

vars:
  sweep_times: 1
  claim_loop_max: 8
  panel_wait_ms: 1200

steps:
  - id: preflight
    do:
      - assert_window: true
      - log: "=== 星穹铁道日常开始 ==="

  - id: ensure_main_menu
    when:
      anchor_missing: main_menu_marker
    retry: 1
    do:
      - wait_for:
          anchor: main_menu_marker
          timeout_ms: 20000
          optional: true
      - log: "等待主界面"

  - id: dismiss_startup_dialogs
    when:
      anchor_visible: dialog_close
    do:
      - click_template:
          anchor: dialog_close
          optional: true
      - wait:
          ms: 400
      - if:
          when:
            anchor_visible: dialog_close
          do:
            - click_template:
                anchor: dialog_close
                optional: true
            - wait:
                ms: 300

  - id: open_guide_book
    when:
      all:
        - anchor_missing: daily_panel_marker
        - anchor_visible: guide_entrance
    do:
      - click_template:
          anchor: guide_entrance
          optional: true
      - wait:
          ms: "{panel_wait_ms}"
      - log: "经开拓指南入口"

  - id: open_daily_panel
    when:
      anchor_missing: daily_panel_marker
    do:
      - click_ocr:
          anchor: daily_text
          optional: true
      - wait:
          ms: 800
      - wait_for:
          anchor: daily_panel_marker
          timeout_ms: 10000
          optional: true
      - log: "打开日常面板"

  - id: claim_daily_rewards
    when:
      anchor_visible: claim_button
    loop:
      max: "{claim_loop_max}"
    do:
      - if:
          when:
            anchor_visible: claim_button
          do:
            - click_template:
                anchor: claim_button
                optional: true
            - wait:
                ms: 500
      - click_template:
          anchor: confirm_button
          optional: true
      - wait:
          ms: 400
      - click_template:
          anchor: dialog_close
          optional: true
      - wait:
          ms: 350

  - id: run_material_sweep
    when:
      all:
        - var_gt:
            sweep_times: 0
        - anchor_visible: sweep_button
    repeat: "{sweep_times}"
    do:
      - click_template:
          anchor: sweep_button
          optional: true
      - wait:
          ms: 600
      - click_template:
          anchor: confirm_button
          optional: true
      - wait:
          ms: 1500
      - log: "扫荡 {sweep_times} 轮"

  - id: return_to_main
    when:
      anchor_missing: main_menu_marker
    do:
      - click_template:
          anchor: dialog_close
          optional: true
      - wait:
          ms: 300
      - wait_for:
          anchor: main_menu_marker
          timeout_ms: 8000
          optional: true

  - id: finish
    do:
      - log: "=== 日常流程结束 ==="
