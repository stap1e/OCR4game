# 星穹铁道 — 日常任务工作流
# 模板图请用 ocr4game-annotate 截取；合成回归见 tests/fixtures/star_rail/
#
# vars 可在步骤中用 {var_name} 引用（整值保留类型，字符串内可部分替换）

name: star_rail_daily
description: |
  日常自动化骨架：主界面 → 开拓指南/活动 → 领取 → 材料本扫荡 → 收尾。
  未就绪的步骤已标 optional: true，补全模板后可去掉 optional。

vars:
  sweep_times: 1
  claim_loop_max: 8
  panel_wait_ms: 1200

steps:
  - id: preflight
    do:
      - assert_window: true
      - log: "=== 星穹铁道日常开始 ==="

  - id: ensure_main_menu
    retry: 1
    do:
      - wait_for:
          anchor: main_menu_marker
          timeout_ms: 20000
          optional: true
      - log: "主界面已就绪（或跳过等待）"

  - id: dismiss_startup_dialogs
    do:
      - click_template:
          anchor: dialog_close
          optional: true
      - wait:
          ms: 400
      - click_template:
          anchor: dialog_close
          optional: true
      - wait:
          ms: 300

  - id: open_guide_book
    do:
      - click_template:
          anchor: guide_entrance
          optional: true
      - wait:
          ms: "{panel_wait_ms}"
      - log: "尝试打开开拓指南/活动入口"

  - id: open_daily_panel
    do:
      - click_ocr:
          anchor: daily_text
          optional: true
      - wait:
          ms: 800
      - wait_for:
          anchor: daily_panel_marker
          timeout_ms: 10000
          optional: true
      - log: "日常/活动面板"

  - id: claim_daily_rewards
    loop:
      max: "{claim_loop_max}"
    do:
      - click_template:
          anchor: claim_button
          optional: true
      - wait:
          ms: 500
      - click_template:
          anchor: confirm_button
          optional: true
      - wait:
          ms: 400
      - click_template:
          anchor: dialog_close
          optional: true
      - wait:
          ms: 350

  - id: run_material_sweep
    repeat: "{sweep_times}"
    do:
      - click_template:
          anchor: sweep_button
          optional: true
      - wait:
          ms: 600
      - click_template:
          anchor: confirm_button
          optional: true
      - wait:
          ms: 1500
      - log: "扫荡 {sweep_times} 轮（需配置 sweep_button 模板）"

  - id: return_to_main
    do:
      - click_template:
          anchor: dialog_close
          optional: true
      - wait:
          ms: 300
      - wait_for:
          anchor: main_menu_marker
          timeout_ms: 8000
          optional: true

  - id: finish
    do:
      - log: "=== 日常流程结束 ==="
