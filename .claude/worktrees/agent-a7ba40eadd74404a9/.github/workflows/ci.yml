name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Run tests
        run: pytest -q

      - name: List games (smoke)
        run: ocr4game --list-games

      - name: Validate daily task (offline)
        run: ocr4game --validate --game star_rail --task daily

      - name: Threshold tool smoke (offline fixture)
        run: python -m ocr4game.tools.threshold_tune --game star_rail --anchor claim_button --frame tests/fixtures/star_rail/frames/daily_panel.png
